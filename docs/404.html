<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — SkyBox</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        background: #fcfbf8;
        color: #121212;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 520px;
      }
      .error-code {
        font-size: clamp(5rem, 12vw, 8rem);
        font-weight: 700;
        letter-spacing: -0.06em;
        line-height: 1;
        background: linear-gradient(135deg, #ff6b1a 0%, #e8570b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        color: #5f5d58;
        font-size: 1.05rem;
        line-height: 1.7;
        margin-bottom: 2rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 1.8rem;
        border-radius: 999px;
        background: #ff6b1a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      }
      .back-link:hover {
        background: #e8570b;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 107, 26, 0.25);
      }
      .back-link:active { transform: translateY(0); }
      .brand {
        margin-top: 3rem;
        font-size: 0.85rem;
        color: #5f5d58;
      }
      .brand a {
        color: #ff6b1a;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1>Page not found</h1>
      <p>
        Sorry, the page you're looking for doesn't exist or has been moved. 
        Let's get you back on track.
      </p>
      <a href="/" class="back-link">
        <span>←</span> Back to Homepage
      </a>
      <p class="brand">
        <a href="/">SkyBox</a> — Cloud-Based Warehouse Management
      </p>
    </div>
  </body>
</html>
